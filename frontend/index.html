<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg"/>
    <title>Doujin Toshokan</title>
</head>
<body>
<header>
    <a class="brand-row" href="#/">
        <span class="kanji" aria-hidden="true">図書館</span>
        <span class="wordmark">Doujin Toshokan</span>
    </a>
    <nav><a href="#/stash">Saved Stash</a></nav>
    <span class="nav-spacer"></span>
    <a id="scan-btn" class="icon-btn" href="#/scan" aria-label="Add titles — Scan / Ingest" title="Add titles — Scan / Ingest">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/><path d="M12 11.5v5M9.5 14h5"/></svg>
    </a>
    <button id="rescan-btn" class="icon-btn" aria-label="Rescan library" title="Rescan library">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 0 1 15.5-6.3L21 8M21 3v5h-5M21 12a9 9 0 0 1-15.5 6.3L3 16M3 21v-5h5"/></svg>
    </button>
    <div class="win-controls">
        <button id="win-min" class="win-btn" aria-label="Minimize" title="Minimize">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"/></svg>
        </button>
        <button id="win-max" class="win-btn" aria-label="Maximize" title="Maximize / restore">
            <svg class="ico-max" viewBox="0 0 24 24" aria-hidden="true"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
            <svg class="ico-restore" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 9V7a1 1 0 0 1 1-1h7a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1h-2"/><rect x="6" y="9" width="9" height="9" rx="1"/></svg>
        </button>
        <button id="win-close" class="win-btn win-close" aria-label="Close" title="Close">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7l10 10M17 7L7 17"/></svg>
        </button>
    </div>
</header>
<main id="view"></main>
<div id="toast-region" aria-live="polite" aria-atomic="false"></div>
<script src="./src/main.ts" type="module"></script>
</body>
</html>
