<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Doujin Toshokan{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body data-page="{% block page %}{% endblock %}">
  <header>
    <a class="brand-row" href="/">
      <span class="kanji" aria-hidden="true">図書館</span>
      <span class="wordmark">Doujin Toshokan</span>
    </a>
    <nav>
      <a href="/scan">Scan / Ingest</a>
    </nav>
    <span class="nav-spacer"></span>
    <form method="post" action="/rescan" data-rescan>
      <button type="submit" class="icon-btn" aria-label="Rescan library" title="Rescan library">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 0 1 15.5-6.3L21 8M21 3v5h-5M21 12a9 9 0 0 1-15.5 6.3L3 16M3 21v-5h5"/></svg>
      </button>
    </form>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <div id="toast-region" aria-live="polite" aria-atomic="false"></div>
  <script src="/static/app.js" defer></script>
</body>
</html>
