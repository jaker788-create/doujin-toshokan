<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Doujin Bunko{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <a class="brand" href="/">Doujin Bunko</a>
    <a href="/scan">Scan / Ingest</a>
    <form method="post" action="/rescan" style="margin-left:auto">
      <button type="submit">Rescan library</button>
    </form>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <script src="/static/app.js" defer></script>
</body>
</html>
